version: 2

sources:
  - name: acb_landing
    description: "Raw JSON payloads extracted directly from the official ACB Basketball API endpoints."
    loader: python_scripts
    
    tables:
      - name: competitions
        description: >
          Global parameters of the running competition.
        meta:
          external_location: "{{ var('landing_data_dir') }}/apiacb_competition/*.json"

      - name: matchlists
        description: >
          Schedules and fixture definitions grouped by rounds or phases.
        meta:
          external_location: "{{ var('landing_data_dir') }}/apiacb_matchlist/*.json"

      - name: match_headers
        description: >
          General match overview and status.
        meta:
          external_location: "{{ var('landing_data_dir') }}/apiacb_match_header/*.json"

      - name: boxscores
        description: >
          Deeply nested traditional boxscores.
        meta:
          external_location: "{{ var('landing_data_dir') }}/apiacb_boxscore/*.json"

      - name: match_shots
        description: >
          Advanced spatial shot charts.
        meta:
          external_location: "{{ var('landing_data_dir') }}/apiacb_match_shots/*.json"

      - name: play_by_play
        description: >
          Chronological live commentary log.
        meta:
          external_location: "{{ var('landing_data_dir') }}/apiacb_play_by_play/*.json"
